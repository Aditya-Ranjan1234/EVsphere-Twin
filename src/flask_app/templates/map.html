{% extends 'base.html' %}
{% block content %}
<div class="container-fluid px-4 py-3">

  <!-- Header -->
  <div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
    <div>
      <h2 class="mb-0 fw-bold">🗺️ Geospatial Digital Twin Map</h2>
      <p class="text-muted-ev mb-0" style="font-size:0.82rem;">Live mapping of EV chargers, suppliers, service centres &amp; vehicles</p>
    </div>
    <div class="d-flex gap-2 flex-wrap align-items-center">
      <span id="map-count" class="text-muted-ev fw-mono" style="font-size:0.78rem;">Loading…</span>
      <button class="ev-btn ev-btn-outline" id="btn-fit-map">⊞ Fit All</button>
    </div>
  </div>

  <!-- Filter Legend Bar -->
  <div class="ev-card mb-3">
    <div class="ev-card-body py-2">
      <div class="d-flex flex-wrap gap-3 align-items-center">
        <span class="section-title mb-0">Filter:</span>
        <label class="legend-item" style="cursor:pointer;">
          <input type="checkbox" class="filter-cb" data-type="Charger" checked> 
          <div class="legend-dot" style="background:#f39c12"></div>Charger
        </label>
        <label class="legend-item" style="cursor:pointer;">
          <input type="checkbox" class="filter-cb" data-type="Supplier" checked>
          <div class="legend-dot" style="background:#e74c3c"></div>Supplier
        </label>
        <label class="legend-item" style="cursor:pointer;">
          <input type="checkbox" class="filter-cb" data-type="ServiceCenter" checked>
          <div class="legend-dot" style="background:#9b59b6"></div>Service Center
        </label>
        <label class="legend-item" style="cursor:pointer;">
          <input type="checkbox" class="filter-cb" data-type="Battery" checked>
          <div class="legend-dot" style="background:#3498db"></div>Battery Facility
        </label>
        <label class="legend-item" style="cursor:pointer;">
          <input type="checkbox" class="filter-cb" data-type="Vehicle" checked>
          <div class="legend-dot" style="background:#2ecc71"></div>Vehicle Hub
        </label>
      </div>
    </div>
  </div>

  <!-- Map -->
  <div class="ev-card">
    <div id="map" style="height:600px; border-radius:0 0 14px 14px;"></div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  // Force explicit dimensions before init
  const mapEl = document.getElementById('map');
  mapEl.style.display = 'block';
  mapEl.style.width = '100%';
  mapEl.style.height = '600px';

  const map = L.map('map', {
    center: [20.5937, 78.9629],
    zoom: 5,
    zoomControl: true,
    attributionControl: true
  });

  // Tile layer – dark CartoDB
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  const TYPE_STYLE = {
    'Charger':       { color: '#f39c12', icon: '⚡' },
    'Supplier':      { color: '#e74c3c', icon: '🏭' },
    'ServiceCenter': { color: '#9b59b6', icon: '🔧' },
    'Battery':       { color: '#3498db', icon: '🔋' },
    'Vehicle':       { color: '#2ecc71', icon: '🚗' },
    'default':       { color: '#00bcd4', icon: '📍' }
  };

  let allMarkers = [];
  let featureData = [];
  let layerGroup = L.layerGroup().addTo(map);

  function getStyle(type) {
    return TYPE_STYLE[type] || TYPE_STYLE.default;
  }

  function createMarker(feature) {
    const coords = feature.geometry.coordinates;
    const latlng  = L.latLng(coords[1], coords[0]);
    const props   = feature.properties || {};
    const type    = props.type || 'default';
    const style   = getStyle(type);

    const marker = L.circleMarker(latlng, {
      radius: 9,
      fillColor: style.color,
      color: '#fff',
      weight: 2,
      opacity: 1,
      fillOpacity: 0.85
    });

    const popupHtml = `
      <div style="font-family:Inter,sans-serif;min-width:160px;">
        <div style="font-size:1.2rem;margin-bottom:4px;">${style.icon}</div>
        <b style="font-size:0.9rem;">${props.name || 'Unknown'}</b><br>
        <span style="color:#aaa;font-size:0.78rem;">Type: ${type}</span><br>
        <span style="color:#aaa;font-size:0.78rem;">
          Lat: ${coords[1].toFixed(4)}, Lng: ${coords[0].toFixed(4)}
        </span>
        ${props.status ? `<br><span style="color:#2ecc71;font-size:0.75rem;">● ${props.status}</span>` : ''}
      </div>`;

    marker.bindPopup(popupHtml, { maxWidth: 220 });
    marker._featureType = type;
    return marker;
  }

  function refreshMarkers() {
    layerGroup.clearLayers();
    const active = new Set(
      [...document.querySelectorAll('.filter-cb:checked')].map(c => c.dataset.type)
    );
    let count = 0;
    featureData.forEach(feature => {
      const type = (feature.properties || {}).type || 'default';
      if (active.has(type) || (!TYPE_STYLE[type] && active.size)) {
        layerGroup.addLayer(createMarker(feature));
        count++;
      }
    });
    document.getElementById('map-count').textContent = count + ' locations';
  }

  // Fetch GeoJSON
  fetch('/api/map')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(geojson => {
      featureData = geojson.features || [];
      refreshMarkers();
      document.getElementById('map-count').textContent = featureData.length + ' locations';

      // Fit to markers
      if (featureData.length) {
        const bounds = featureData.map(f => [f.geometry.coordinates[1], f.geometry.coordinates[0]]);
        map.fitBounds(L.latLngBounds(bounds), { padding: [40, 40] });
      }
    })
    .catch(err => {
      console.error('Map load error:', err);
      document.getElementById('map-count').textContent = 'Error loading data';
    });

  // Filter checkboxes
  document.querySelectorAll('.filter-cb').forEach(cb => {
    cb.addEventListener('change', refreshMarkers);
  });

  // Fit All button
  document.getElementById('btn-fit-map').addEventListener('click', () => {
    if (featureData.length) {
      const bounds = featureData.map(f => [f.geometry.coordinates[1], f.geometry.coordinates[0]]);
      map.fitBounds(L.latLngBounds(bounds), { padding: [40, 40] });
    }
  });

  // Fix Leaflet tile rendering after layout paint
  setTimeout(() => { map.invalidateSize(); }, 200);
});
</script>
{% endblock %}
