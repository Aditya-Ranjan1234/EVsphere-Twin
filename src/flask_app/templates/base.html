<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EVSphere AI – Digital Twin Platform</title>
  <meta name="description" content="EVSphere AI: Premium digital twin for the EV ecosystem. Real-time failure simulation, graph analytics, and geospatial intelligence.">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <!-- Custom Premium Theme -->
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body>
  <!-- Sticky Navigation -->
  <nav class="ev-navbar navbar navbar-expand-lg">
    <div class="container-fluid px-3">
      <a class="ev-brand navbar-brand" href="/" id="main-logo">
        <div class="brand-icon"></div>
        EVSphere AI
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span style="color:var(--accent-cyan); font-size:1.2rem;">☰</span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto gap-1 align-items-center">
          <li class="nav-item"><a class="nav-link" href="/" id="nav-home">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link" href="/digital-twin" id="nav-dt">Digital Twin</a></li>
          <li class="nav-item"><a class="nav-link" href="/graph" id="nav-graph">Network Graph</a></li>
          <li class="nav-item"><a class="nav-link" href="/map" id="nav-map">Geo‑Map</a></li>
          <li class="nav-item"><a class="nav-link" href="/predict" id="nav-predict">Simulate</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page Content (NO wrapping container so map/graph can fill full width) -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- Tooltip -->
  <div class="ev-tooltip" id="ev-tooltip"></div>

  <!-- Scripts (global) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.0/cytoscape.min.js" crossorigin="anonymous"></script>
  <!-- Plotly for Sankey -->
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

  <script>
    // ── Active nav link highlight ──────────────────────────
    (function() {
      const path = window.location.pathname;
      document.querySelectorAll('.nav-link').forEach(a => {
        const href = a.getAttribute('href');
        if (href === '/' ? path === '/' : (path.startsWith(href) && href !== '/')) {
          a.classList.add('active');
        }
      });
    })();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
